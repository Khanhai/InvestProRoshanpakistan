<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Dashboard | InvestPro</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --primary:#FFA500;
  --bg:#fff;
  --card:#fff5e6;
  --text:#333;
  --status-approved:#28a745;
  --status-pending:#ff9900;
  --status-none:#888;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);line-height:1.6;display:flex;flex-direction:column;min-height:100vh;}

header{
  height:70px; display:flex; justify-content:space-between; align-items:center;
  padding:0 2rem; background:var(--bg); box-shadow:0 2px 10px rgba(0,0,0,.05);
}
header .logo{font-size:1.5rem;font-weight:700;color:var(--primary);display:flex;flex-direction:column;line-height:1;}
header .logo small{font-size:.8rem;font-weight:400;color:#555;margin-top:2px;}
header .logout-btn{background:var(--primary);color:#fff;padding:.55rem 1.3rem;border-radius:25px;text-decoration:none;display:flex;align-items:center;gap:.5rem;font-weight:600;transition: transform .3s, box-shadow .3s;}
header .logout-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,165,0,.4);}

main{flex:1;padding:2rem;}

.referral-container{
  max-width:900px;margin:0 auto;padding:2rem;background:var(--card);border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,.05);animation:fadeIn 1s ease;display:flex;flex-direction:column;gap:1.5rem;
}

.ref-code-container{
  display:flex;justify-content:space-between;align-items:center;background:#fff;padding:1rem;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.05);}
.ref-code-container p{margin:0;font-weight:600;color:var(--primary);}
.ref-code-container button{
  background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:25px;font-weight:600;cursor:pointer;transition: transform .3s, box-shadow .3s;}
.ref-code-container button:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,165,0,.4);}

.summary-cards{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.summary-card{flex:1;min-width:150px;padding:1rem;background:#fff;border-radius:15px;box-shadow:0 6px 15px rgba(0,0,0,.05);text-align:center;}
.summary-card h4{color:var(--primary);font-weight:600;font-size:1rem;}
.summary-card p{font-weight:600;font-size:1.1rem;color:#555;}

.referral-table-container{overflow-x:auto;}
.referral-table{width:100%;border-collapse:collapse;min-width:600px;}
.referral-table th, .referral-table td{border:1px solid #ddd;padding:.8rem;text-align:center;}
.referral-table th{background:var(--primary);color:#fff;font-weight:600;}
.status-approved{color:var(--status-approved);font-weight:600;}
.status-pending{color:var(--status-pending);font-weight:600;}
.status-none{color:var(--status-none);font-weight:600;}

footer{background:var(--card);text-align:center;font-size:.85rem;color:#555;padding:.8rem 0;flex-shrink:0;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<header>
  <div class="logo">InvestPro<br><small>Roshan Pakistan</small></div>
  <a href="dashboard.html" class="logout-btn"><i class="fa-solid fa-house"></i> Dashboard</a>
</header>

<main>
  <div class="referral-container animate__animated animate__fadeIn">
    <h2><i class="fa-solid fa-gift"></i> Your Referrals</h2>

    <!-- Referral Code -->
    <div class="ref-code-container">
      <p id="refCode">YourCode123</p>
      <button id="copyBtn"><i class="fa-solid fa-copy"></i> Copy</button>
    </div>

    <!-- Summary -->
    <div class="summary-cards">
      <div class="summary-card">
        <h4>Total Referrals</h4>
        <p id="totalReferrals">0</p>
      </div>
      <div class="summary-card">
        <h4>Approved Referrals</h4>
        <p id="approvedReferrals">0</p>
      </div>
      <div class="summary-card">
        <h4>Referral Earnings</h4>
        <p id="referralEarnings">PKR 0</p>
      </div>
    </div>

    <!-- Referral Table -->
    <div class="referral-table-container">
      <table class="referral-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Reward (PKR)</th>
          </tr>
        </thead>
        <tbody id="referralBody">
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 InvestPro. All rights reserved.
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC-VDLeGkVEHRx3bu1SUAwvv8t6Y6Fz0Dg",
  authDomain: "khanbaba-2d4e5.firebaseapp.com",
  databaseURL: "https://khanbaba-2d4e5-default-rtdb.firebaseio.com",
  projectId: "khanbaba-2d4e5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;

const referralBody = document.getElementById('referralBody');
const totalReferralsEl = document.getElementById('totalReferrals');
const approvedReferralsEl = document.getElementById('approvedReferrals');
const referralEarningsEl = document.getElementById('referralEarnings');

// Auth check
onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.href='login.html';
  currentUser = user;

  const referralRef = ref(db, 'referrals/' + currentUser.uid);
  const userBalanceRef = ref(db, 'users/' + currentUser.uid);

  // Listen for live updates
  onValue(referralRef, (snap) => {
    const referrals = snap.val() || {};
    referralBody.innerHTML = '';
    let total = 0, approved = 0, earnings = 0;

    for (const uid in referrals) {
      const r = referrals[uid];
      const status = r.investmentApproved ? 'Approved' : 'Pending';
      const reward = r.investmentApproved ? 200 : 0;

      if (r.investmentApproved) {
        approved++;
        earnings += reward;
      }
      total++;

      referralBody.innerHTML += `
        <tr>
          <td>${r.name || '-'}</td>
          <td>${r.email || '-'}</td>
          <td class="status-${status.toLowerCase()}">${status}</td>
          <td>${reward}</td>
        </tr>
      `;
    }

    totalReferralsEl.innerText = total;
    approvedReferralsEl.innerText = approved;
    referralEarningsEl.innerText = `PKR ${earnings}`;

    // Update live referral balance in user data
    update(userBalanceRef, { refBalance: earnings });
  });
});
</script>

</body>
</html>
