<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refer & Earn | InvestPro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
font-family:'Inter',sans-serif;
background:#fff;
margin:0;
padding:0;
}

header{
background:#FFA500;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:600;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff5e6;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h3{
color:#FFA500;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
margin-top:10px;
background:#FFA500;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th, table td{
border-bottom:1px solid #eee;
padding:10px;
text-align:left;
}

.reward{
color:green;
font-weight:600;
}

.tab-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff5e6;
display:flex;
justify-content:space-around;
padding:8px 0;
border-top:1px solid #ddd;
}

.tab-bar a{
text-decoration:none;
color:#555;
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
}

.tab-bar i{
font-size:18px;
margin-bottom:2px;
}

</style>
</head>
<body>

<header>Refer & Earn</header>

<div class="container">

<div class="card">
<h3>Your Referral Code</h3>
<input id="refCode" readonly>
<button onclick="copyCode()">Copy Code</button>
</div>

<div class="card">
<h3>Referral Earnings</h3>
<p>Total Earnings: <span id="refEarnings">PKR 0</span></p>
</div>

<div class="card">
<h3>Your Referrals</h3>

<table>
<thead>
<tr>
<th>User</th>
<th>Status</th>
<th>Reward</th>
</tr>
</thead>

<tbody id="refList">
</tbody>

</table>

</div>

</div>

<div class="tab-bar">
<a href="dashboard.html"><i class="fa-solid fa-house"></i>Home</a>
<a href="invest.html"><i class="fa-solid fa-wallet"></i>Invest</a>
<a href="earn.html"><i class="fa-solid fa-coins"></i>Earn</a>
<a href="withdraw.html"><i class="fa-solid fa-hand-holding-dollar"></i>Withdraw</a>
<a href="refer.html"><i class="fa-solid fa-gift"></i>Refer</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyC-VDLeGkVEHRx3bu1SUAwvv8t6Y6Fz0Dg",
authDomain:"khanbaba-2d4e5.firebaseapp.com",
databaseURL:"https://khanbaba-2d4e5-default-rtdb.firebaseio.com",
projectId:"khanbaba-2d4e5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const refCodeEl = document.getElementById("refCode");
const refList = document.getElementById("refList");
const refEarnings = document.getElementById("refEarnings");

let currentUser;

onAuthStateChanged(auth, user => {

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

const code = user.uid.substring(0,6).toUpperCase();
refCodeEl.value = code;

loadReferrals(code);

});

function loadReferrals(code){

onValue(ref(db,"users"), snapshot=>{

refList.innerHTML="";
let total=0;

snapshot.forEach(child=>{

const data = child.val();

if(data.referredBy === code){

const uid = child.key;

get(ref(db,"investments/"+uid)).then(snap=>{

let status="No Investment";
let reward="0";

if(snap.exists()){

const inv = Object.values(snap.val())[0];

if(inv.status === "approved"){

status="Approved";

reward="120";

total+=120;

giveRewardOnce(uid);

}else if(inv.status==="pending"){

status="Pending";

}

}

refList.innerHTML += `
<tr>
<td>${data.name || "User"}</td>
<td>${status}</td>
<td class="reward">PKR ${reward}</td>
</tr>
`;

refEarnings.innerText = "PKR "+total;

});

}

});

});

}

function giveRewardOnce(uid){

const rewardRef = ref(db,"users/"+uid+"/rewardGiven");

get(rewardRef).then(snap=>{

if(!snap.val()){

get(ref(db,"users/"+currentUser.uid+"/refBalance")).then(s=>{

const bal = s.val() || 0;

update(ref(db,"users/"+currentUser.uid),{
refBalance: bal + 120
});

update(ref(db,"users/"+uid),{
rewardGiven:true
});

});

}

});

}

window.copyCode = function(){

navigator.clipboard.writeText(refCodeEl.value);

alert("Referral Code Copied!");

}

</script>

</body>
</html>
