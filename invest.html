<!DOCTYPE html>
<html>
<head>
<title>Send Rs 100</title>
<meta charset="utf-8">
</head>
<body>
<h2>Send Rs 100 to Wallet</h2>
<input type="text" id="name" placeholder="Name">
<input type="text" id="wallet" placeholder="Wallet Number">
<button id="payBtn">Send Rs 100</button>
<div id="msg"></div>

<script>
const payBtn = document.getElementById("payBtn");
const msg = document.getElementById("msg");

payBtn.onclick = async () => {
    const name = document.getElementById("name").value;
    const wallet = document.getElementById("wallet").value;

    if(!name || !wallet){
        msg.innerText = "Enter all fields!";
        return;
    }

    msg.innerText = "Processing...";

    try{
        const res = await fetch("https://us-central1-YOUR_FIREBASE_PROJECT.cloudfunctions.net/sendPayment", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ name, wallet, amount:100 })
        });
        const data = await res.json();
        if(data.success){
            msg.innerText = "Payment sent successfully ✔️";
        }else{
            msg.innerText = "Payment failed: " + data.error;
        }
    }catch(err){
        msg.innerText = "Error: " + err.message;
    }
};
</script>
</body>
</html>
