<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw | InvestPro</title>

<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
:root{
  --primary:#FFA500;
  --bg:#fff;
  --card:#fff5e6;
  --text:#333;
  --header-height:70px;
  --status-approved:#28a745;
  --status-pending:#ff9900;
  --status-rejected:red;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);line-height:1.6;display:flex;flex-direction:column;min-height:100vh;}

#pageLoader,#requestOverlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(255,255,255,0.95);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:3000;
}
#requestOverlay{display:none}
.spinner{
  width:60px;height:60px;border:5px solid #fff;
  border-top:5px solid var(--primary);
  border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem;
}
.loader-text{color:var(--primary);font-weight:600}

header{
  height:var(--header-height);
  display:flex;justify-content:space-between;align-items:center;
  padding:0 2rem;background:var(--bg);
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
header .logo{
  font-size:1.5rem;font-weight:700;color:var(--primary);
  display:flex;flex-direction:column;line-height:1;
}
header .logo small{
  font-size:.8rem;font-weight:400;color:#555;margin-top:2px;
}
header .dashboard-btn{
  background:var(--primary);color:#fff;
  padding:.55rem 1.3rem;border-radius:25px;text-decoration:none;
  display:flex;align-items:center;gap:.5rem;font-weight:600;
  transition: transform .3s, box-shadow .3s;
}
header .dashboard-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,165,0,.4);}

main{flex:1;opacity:0;transition:opacity .5s ease;padding:2rem 0;}

.withdraw-container{
  max-width:900px;margin:2rem auto;padding:2rem;
  background:var(--card);border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}
.withdraw-container h2{text-align:center;color:var(--primary);margin-bottom:1rem}

.live-balance{
  font-size:2.5rem;
  font-weight:700;
  text-align:center;
  margin-bottom:1.5rem;
  color:var(--primary);
  letter-spacing:1px;
  background: linear-gradient(90deg,#FFA500,#ffcc33);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-group{display:flex;flex-direction:column;margin-bottom:1rem}
.form-group label{font-weight:600;margin-bottom:.3rem}
.form-group input,.form-group select{
  padding:.8rem 1rem;border:1px solid #ccc;border-radius:10px;outline:none
}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}

.submit-btn{
  width:100%;padding:1rem;background:var(--primary);
  color:#fff;border:none;border-radius:25px;font-weight:600;
  cursor:pointer;
}

.notification{
  display:none;background:#ffebcc;color:#cc6600;
  padding:1rem;text-align:center;border-radius:10px;margin-bottom:1rem;
  font-weight:600
}

.history-table-container{overflow-x:auto; margin-top:2rem;}
.history-table{width:100%; border-collapse:collapse; min-width:600px;}
.history-table th, .history-table td{border:1px solid #ddd; padding:0.5rem; text-align:center;}
.history-table th{background: var(--primary); color:#fff; font-weight:600;}
.status-pending{color:var(--status-pending); font-weight:600;}
.status-approved{color:var(--status-approved); font-weight:600;}
.status-rejected{color:var(--status-rejected); font-weight:600;}

footer{background:var(--card);padding:1.5rem;text-align:center;color:#555;flex-shrink:0;}

@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="pageLoader">
  <div class="spinner"></div>
  <div class="loader-text">Loading Withdraw Page...</div>
</div>

<div id="requestOverlay">
  <div class="spinner"></div>
  <div class="loader-text">Sending Withdraw Request...</div>
</div>

<header>
  <div class="logo">InvestPro<br><small>Roshan Pakistan</small></div>
  <a href="dashboard.html" class="dashboard-btn">
    <i class="fa-solid fa-chart-line"></i> Dashboard
  </a>
</header>

<main>
<div class="withdraw-container animate__animated animate__fadeIn">

<h2><i class="fa-solid fa-money-bill-wave"></i> Withdraw Funds</h2>

<div class="live-balance" id="liveBalance">0 PKR</div>
<div class="notification" id="notification"></div>

<div class="form-group">
<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Number</label>
<input type="text" id="number" placeholder="Enter your mobile number">
</div>

<div class="form-group">
<label>Payment Type</label>
<select id="type">
<option value="">Select</option>
<option value="JazzCash">JazzCash</option>
<option value="EasyPaisa">EasyPaisa</option>
</select>
</div>

<div class="form-group">
<label>Amount (PKR)</label>
<input type="number" id="amount" placeholder="Enter amount (5 - 1000000000000000000000000)">
</div>

<button class="submit-btn" id="submitBtn">
<i class="fa-solid fa-paper-plane"></i> Request Withdraw
</button>

<div class="history-table-container">
<table class="history-table animate__animated animate__fadeInUp" id="historyTable">
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Type</th>
<th>Number</th>
<th>Status</th>
</tr>
</thead>
<tbody id="historyBody">
<tr><td colspan="5">Loading...</td></tr>
</tbody>
</table>
</div>

</div>
</main>

<footer>
&copy; 2025 InvestPro. All rights reserved.
</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { getDatabase, ref, get, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyC-VDLeGkVEHRx3bu1SUAwvv8t6Y6Fz0Dg",
  authDomain:"khanbaba-2d4e5.firebaseapp.com",
  databaseURL:"https://khanbaba-2d4e5-default-rtdb.firebaseio.com",
  projectId:"khanbaba-2d4e5"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

const pageLoader=document.getElementById("pageLoader");
const requestOverlay=document.getElementById("requestOverlay");
const main=document.querySelector("main");
const historyBody=document.getElementById("historyBody");
const notification=document.getElementById("notification");
const liveBalance=document.getElementById("liveBalance");

let currentUser=null;

function showNotification(msg){
  notification.innerText=msg;
  notification.style.display="block";
  setTimeout(()=>notification.style.display="none",3000);
}

async function updateBalance(){
  const snap=await get(ref(db,"users/"+currentUser.uid+"/balance"));
  const bal=snap.val()||0;
  liveBalance.innerText=bal+" PKR";
  return bal;
}

async function fetchHistory(){
  const snap=await get(ref(db,"withdrawals/"+currentUser.uid));
  const data=snap.val()||{};
  historyBody.innerHTML="";
  const records=Object.values(data);

  if(records.length===0){
    historyBody.innerHTML="<tr><td colspan='5'>No withdrawal history yet.</td></tr>";
    return;
  }

  records.sort((a,b)=>b.timestamp-a.timestamp);

  records.forEach(w=>{
    let statusClass="";
    if(w.status==="Pending")statusClass="status-pending";
    else if(w.status==="Approved")statusClass="status-approved";
    else statusClass="status-rejected";

    const dateStr=new Date(w.timestamp).toLocaleString("en-PK",{dateStyle:"medium",timeStyle:"short"});

    historyBody.innerHTML+=`
    <tr>
      <td>${dateStr}</td>
      <td>${w.amount}</td>
      <td>${w.type}</td>
      <td>${w.number || ''}</td>
      <td class="${statusClass}">${w.status}</td>
    </tr>`;
  });
}

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    updateBalance();
    fetchHistory();
    pageLoader.style.display="none";
    main.style.opacity="1";

    onValue(ref(db,"withdrawals/"+currentUser.uid), snapshot=>{
      fetchHistory();
      updateBalance();
    });

  }else{
    window.location.href="login.html";
  }
});

// ===== Withdraw Request =====
document.getElementById("submitBtn").addEventListener("click", async ()=>{
  const name=document.getElementById("name").value.trim();
  const number=document.getElementById("number").value.trim();
  const type=document.getElementById("type").value;
  const amount=parseFloat(document.getElementById("amount").value);

  if(!name || !number || !type || !amount){
    showNotification("Please fill all fields");
    return;
  }

  if(amount<5 || amount>10000000000000000){
    showNotification("Amount must be between 5 - 10000000000000000 PKR");
    return;
  }

  const balSnap=await get(ref(db,"users/"+currentUser.uid+"/balance"));
  const balance=balSnap.val()||0;

  if(amount>balance){
    showNotification("Insufficient balance");
    return;
  }

  // Deduct temporarily
  const withdrawSnap = await get(ref(db,"users/"+currentUser.uid+"/withdrawBalance"));
  const currentWithdraw = withdrawSnap.val() || 0;

  await update(ref(db,"users/"+currentUser.uid), {
    balance: balance - amount,
    withdrawBalance: currentWithdraw + amount
  });

  requestOverlay.style.display="flex";

  const newRef=push(ref(db,"withdrawals/"+currentUser.uid));
  await set(newRef,{
    name,
    number,
    type,
    amount,
    status:"Pending",
    timestamp:Date.now()
  });

  setTimeout(()=>{
    requestOverlay.style.display="none";
    showNotification("Withdraw request sent. Amount temporarily deducted.");
    fetchHistory();
    updateBalance();
  },800);
});
</script>
</body>
</html>
