<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages & Live Withdrawals | InvestPro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --primary:#FFA500;
  --bg:#f4f4f9;
  --card:#fff;
  --text:#333;
  --header-height:70px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{height:var(--header-height);display:flex;justify-content:space-between;align-items:center;padding:0 2rem;background:var(--bg);box-shadow:0 2px 10px rgba(0,0,0,.05);}
header .logo{font-size:1.5rem;font-weight:700;color:var(--primary);}
header .logout-btn{background:var(--primary);color:#fff;padding:.55rem 1.3rem;border-radius:25px;text-decoration:none;display:flex;align-items:center;gap:.5rem;font-weight:600;transition: transform .3s;}
header .logout-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,165,0,.4);}
main{flex:1;padding:2rem 1rem;}
.message-box{
  max-width:900px;margin:0 auto 2rem auto;padding:1.5rem 2rem;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,.1);
  text-align:center;opacity:0;transition:opacity .5s; background:var(--card); color:#333;
}
.message-title{font-weight:700;font-size:1.2rem;margin-bottom:0.5rem;}
.withdrawal-feed{
  max-width:900px;margin:0 auto;padding:1rem;background:var(--card);border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,.05);overflow:hidden;height:400px;position:relative;
}
.withdrawal-list{position:absolute;top:0;left:0;width:100%;will-change:transform;}
.withdrawal-item{display:flex;justify-content:space-between;padding:.5rem 1rem;border-bottom:1px solid #eee;animation:fadeIn 0.5s ease forwards;}
.withdrawal-item.big{background:linear-gradient(90deg,#ffd700,#ffa500);color:#000;font-weight:700;box-shadow:0 4px 15px rgba(255,165,0,.6);border-radius:8px;margin:2px 0;}
@keyframes fadeIn{0%{opacity:0;transform:translateY(-5px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header>
  <div class="logo">InvestPro Live Feed</div>
  <a href="login.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</header>

<main>
  <!-- Admin Updated Message -->
  <div class="message-box" id="adminMessage">
    <div class="message-title" id="adminMessageTitle">Loading title...</div>
    <div class="message-content" id="adminMessageContent">Loading message...</div>
  </div>

  <!-- Live Withdrawal Feed -->
  <div class="withdrawal-feed">
    <div class="withdrawal-list" id="withdrawalList"></div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-VDLeGkVEHRx3bu1SUAwvv8t6Y6Fz0Dg",
  authDomain: "khanbaba-2d4e5.firebaseapp.com",
  databaseURL: "https://khanbaba-2d4e5-default-rtdb.firebaseio.com",
  projectId: "khanbaba-2d4e5"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const adminMessageEl = document.getElementById('adminMessage');
const adminTitleEl = document.getElementById('adminMessageTitle');
const adminContentEl = document.getElementById('adminMessageContent');
const withdrawalListEl = document.getElementById('withdrawalList');

// === Live admin message from Firebase ===
onValue(ref(db, 'adminMessages'), snap => {
  const messages = snap.val();
  if(messages){
    const keys = Object.keys(messages);
    const latest = messages[keys[keys.length - 1]];
    adminTitleEl.innerText = latest.title || 'No Title';
    adminContentEl.innerText = latest.text || 'No message';
  } else {
    adminTitleEl.innerText = 'No Title';
    adminContentEl.innerText = 'No messages yet';
  }
  adminMessageEl.style.opacity = 1;
});

// === Withdrawal feed ===
const firstNames = ["Ali","Ahmed","Aisha","Zain","Sara","Hassan","Hina","Usman","Fatima","Omar"];
const lastNames = ["Khan","Shah","Qureshi","Malik","Raza","Chaudhry","Saeed","Hussain","Farooq","Iqbal"];
function randomAmount(){return (Math.random()*1000+100).toFixed(2);}
function randomName(){return firstNames[Math.floor(Math.random()*firstNames.length)]+' '+lastNames[Math.floor(Math.random()*lastNames.length)];}

let withdrawals = [];
for(let i=0;i<50;i++){withdrawals.push({name: randomName(), amount: randomAmount()});}

function renderWithdrawals(){
  withdrawalListEl.innerHTML = withdrawals.map(w=>{
    const isBig = parseFloat(w.amount) > 500 ? 'big' : '';
    return `<div class="withdrawal-item ${isBig}">${w.name} <span>PKR ${w.amount}</span></div>`;
  }).join('');
}

let yPos = 0;
function animateList(){
  yPos -= 0.5; // slower smooth scroll
  if(yPos < -withdrawalListEl.offsetHeight) yPos = withdrawalListEl.parentElement.offsetHeight;
  withdrawalListEl.style.transform = `translateY(${yPos}px)`;
  requestAnimationFrame(animateList);
}
animateList();
renderWithdrawals();

setInterval(()=>{
  const newWithdrawal = {name: randomName(), amount: randomAmount()};
  withdrawals.push(newWithdrawal);
  if(withdrawals.length>100) withdrawals.shift();   
  renderWithdrawals();
},3000);
</script>

</body>
</html>
